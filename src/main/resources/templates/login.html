<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" th:href="@{/img/logosolo.png}">
    <title>Login - InmoSwift Admin</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            max-width: 400px;
            width: 100%;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .login-logo {
            height: 80px;
            width: auto;
            margin-bottom: 20px;
        }

        .login-title {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            color: #2c3e50;
            text-transform: uppercase;
            margin-bottom: 25px;
        }

        .form-control {
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ced4da;
        }

        .btn-login {
            background-color: #2c3e50;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: 600;
            color: white;
            transition: background 0.3s;
        }

        .btn-login:hover {
            background-color: #1a252f;
        }

        .error-msg {
            color: #e74c3c;
            background: #fdeaea;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img th:src="@{/img/logo.png}" alt="InmoSwift Logo" class="login-logo">
        
        <h2 class="login-title">Acceso Admin</h2>

        <div th:if="${param.error}" class="error-msg">
            Usuario o contraseña incorrectos.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3 text-start">
                <label class="form-label fw-bold">Usuario</label>
                <input type="text" name="username" class="form-control" placeholder="Nombre de usuario" required autofocus>
            </div>
            
            <div class="mb-4 text-start">
                <label class="form-label fw-bold">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login shadow-sm">Ingresar al Panel</button>
        </form>

        <div class="mt-4">
            <a href="/publica/home" class="text-muted text-decoration-none small">← Volver al sitio público</a>
        </div>
    </div>

</body>
</html>

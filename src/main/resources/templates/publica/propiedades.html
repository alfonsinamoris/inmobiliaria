<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" th:href="@{/img/logosolo.png}">
    <title>Inmobiliaria Lucrecia Moreno </title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    
    
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f8f9fa; }
        .hero-section { background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1564013799919-ab600027ffc6?ixlib=rb-4.0.3&auto=format&fit=crop&w=1350&q=80'); 
                        background-size: cover; color: white; padding: 60px 0; text-align: center; }
        .card-img-top { height: 200px; object-fit: cover; }
        .card { transition: transform 0.2s; border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card:hover { transform: scale(1.03); }
        .price-tag { color: #495057; font-weight: bold; font-size: 1.2rem; }

        .search-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-top: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .form-label-custom {
            font-size: 0.85rem;
            font-weight: 600;
            color: #495057;
            text-transform: uppercase;
            margin-bottom: 8px;
            display: block;
        }

        .btn-search {
            background-color: #495057;
            border: none;
            height: 50px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-search:hover {
            background-color: #1a252f;
            transform: translateY(-2px);
        }

        .form-control, .form-select {
            height: 50px; /* Inputs más altos son más cómodos y modernos */
            border: 1px solid #dee2e6;
        }

        /* Estilo para el output del rango */
        #rangeValue {
            font-weight: bold;
            color: #495057 !important;
            font-size: 0.9rem;
        }

        #range4::-webkit-slider-thumb {
            -webkit-appearance: none;
            background: #6c757d;
            border-radius: 50%;
            height: 18px;
            width: 18px;
            cursor: pointer;
        }

        .btn-dark{
            background-color: #495057;
        }

       
    </style>
</head>



<body>
    <header>
        <div th:replace="~{layout/navbar :: header}"></div>
    </header>

   <div class="container position-relative" style="z-index: 10;">
    <div class="search-container">
        <form class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="form-label-custom">¿Dónde buscás?</label>
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 text-muted"></span>
                    <input type="text" class="form-control border-start-0" placeholder="Tandil, CABA...">
                </div>
            </div>

            <div class="col-md-3">
                <label class="form-label-custom">Operación</label>
                <select class="form-select">
                    <option value="" selected disabled>Seleccionar...</option>
                    <option value="Alquiler">Alquiler</option>
                    <option value="Venta">Venta</option>
                </select>
            </div>

            <div class="col-md-4">
                <div class="d-flex justify-content-between">
                    <label class="form-label-custom">Presupuesto Máximo</label>
                    <span id="rangeValue" class="text-success">$500.000</span>
                </div>
                <input type="range" class="form-range" min="100000" max="5000000" step="50000" value="500000" id="range4">
            </div>

            <div class="col-md-2">
                <button type="submit" class="btn btn-primary btn-search w-100">
                     Buscar
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    const rangeInput = document.getElementById('range4');
    const rangeOutput = document.getElementById('rangeValue');

    rangeInput.addEventListener('input', function() {
        // Formateo de moneda para que se vea profesional (ej: $500.000)
        const value = new Intl.NumberFormat('es-AR', {
            style: 'currency',
            currency: 'ARS',
            maximumFractionDigits: 0
        }).format(this.value);
        
        rangeOutput.textContent = value;
    });
</script>

    <main class="container my-5">
        <div class="row row-cols-1 row-cols-md-3 g-4">
            
            <div class="col" th:each="p : ${propiedades}">
                <div class="card h-100">
                    <img src="https://images.unsplash.com/photo-1570129477492-45c003edd2be?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" class="card-img-top" alt="Propiedad">
                    <div class="card-body">
                        <div class="d-flex justify-content-between">
                            <h5 class="card-title" th:text="${p.titulo}">Título de la casa</h5>
                            <span class="badge bg-info text-dark" th:text="${p.tipo}">Alquiler</span>
                        </div>
                        <p class="text-muted"><small>📍 <span th:text="${p.ubicacion}">Ubicación</span></small></p>
                        <p class="card-text text-secondary" th:text="${p.descripcion}">Descripción breve de la propiedad...</p>
                    </div>
                    <div class="card-footer bg-white border-top-0 d-flex justify-content-between align-items-center">
                        <span class="price-tag">$ <span th:text="${#numbers.formatDecimal(p.precio, 0, 'POINT', 0, 'COMMA')}">0.000</span></span>
                        <a th:href="@{/publica/detalle/{id}(id=${p.id})}" type="button" class="btn btn-dark">Ver más</a>
                    </div>
                </div>
            </div>
            
            <div class="col-12 text-center py-5" th:if="${#lists.isEmpty(propiedades)}">
                <h3>No se encontraron propiedades disponibles.</h3>
            </div>

        </div>
    </main>
    <footer>
         <div th:replace="~{layout/footer :: footer}"></div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" th:href="@{/img/logosolo.png}">
        <title>Contacto - Inmobiliaria Lucrecia Moreno</title>
        <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">        
        
        <style>
            body { 
                font-family: 'Roboto', sans-serif; 
                background-color: #f4f7f6; /* Un gris más suave y profesional */
            }
            
            .contact-container {
                max-width: 800px; /* Evita que el form sea demasiado ancho */
                margin: 50px auto;
                background: white;
                padding: 40px;
                border-radius: 15px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            }

            .title-contacto {  
                font-family: "Oswald", sans-serif; 
                font-weight: 700; 
                text-transform: uppercase;
                letter-spacing: 1px;
                color: #868282;
                margin-bottom: 30px;
                text-align: center;
            }

            .form-label {
                font-weight: 500;
                color: #495057;
                margin-bottom: 8px;
            }

            .form-control {
                border-radius: 8px;
                padding: 12px;
                border: 1px solid #ced4da;
                transition: all 0.3s ease;
            }

            .form-control:focus {
                border-color: #495057;
                box-shadow: 0 0 0 0.25rem rgba(44, 62, 80, 0.1);
            }

            .btn-enviar {
                background-color: #868282;
                border: none;
                padding: 12px 30px;
                border-radius: 8px;
                font-weight: 600;
                transition: background 0.3s;
                width: 100%; /* Botón ancho para cerrar el diseño */
                margin-top: 20px;
            }

            .btn-enviar:hover {
                background-color: #A19F9F;
                color: white;
            }
        </style>
    </head>
    <body>
        <header>
            <div th:replace="~{layout/navbar :: header}"></div>
        </header>

        <div class="container">
            <div class="contact-container">
                <h1 class="title-contacto">Contactate con nosotros</h1>
                
                <form class="row g-4">
                    <div class="col-md-6">
                        <label for="inputName" class="form-label">Nombre completo</label>
                        <input type="text" class="form-control" id="inputName" placeholder="Juan Pérez">
                    </div>

                    <div class="col-md-6">
                        <label for="inputEmail" class="form-label">Email</label>
                        <input type="email" class="form-control" id="inputEmail" placeholder="ejemplo@correo.com">
                    </div>

                    <div class="col-md-4">
                        <label for="inputPhone" class="form-label">Teléfono</label>
                        <input type="tel" class="form-control" id="inputPhone" placeholder="249 4123456">
                    </div>

                    <div class="col-md-8"></div>

                    <div class="col-12">
                        <label for="inputConsult" class="form-label">Tu consulta</label>
                        <textarea class="form-control" id="inputConsult" rows="6" placeholder="¿En qué podemos ayudarte?"></textarea>
                    </div>

                    <div class="col-12 text-center">
                        <button type="submit" class="btn btn-primary btn-enviar">Enviar Mensaje</button>
                    </div>
                </form>
            </div>
        </div>

        <footer>
            <div th:replace="~{layout/footer :: footer}"></div>
        </footer>
    </body>
</html>
